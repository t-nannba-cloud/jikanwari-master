<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }

.header { background: #4361ee; color: white; padding: 14px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
.header h1 { font-size: 20px; font-weight: 700; }
.active-preset-badge { background: rgba(255,255,255,0.25); padding: 3px 10px; border-radius: 12px; font-size: 13px; }

.tabs { display: flex; background: white; border-bottom: 2px solid #e0e0e0; }
.tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-size: 14px; color: #666; border-bottom: 3px solid transparent; margin-bottom: -2px; }
.tab.active { color: #4361ee; border-bottom-color: #4361ee; font-weight: 600; }

.content { padding: 16px; max-width: 900px; margin: 0 auto; }

.timetable-wrap { overflow-x: auto; }
.timetable { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); min-width: 500px; }
.timetable th { background: #4361ee; color: white; padding: 10px 6px; text-align: center; font-size: 14px; }
.timetable td { border: 1px solid #e8e8e8; padding: 0; vertical-align: top; }
.period-cell { width: 80px; padding: 8px 6px; text-align: center; background: #f8f9ff; }
.period-label { font-size: 13px; font-weight: 600; color: #4361ee; }
.period-time { font-size: 10px; color: #888; margin-top: 2px; }
.cell { min-height: 60px; padding: 6px; cursor: pointer; transition: background 0.15s; }
.cell:hover { background: #f0f4ff; }
.cell.empty { display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 20px; }
.cell-subject { font-size: 13px; font-weight: 600; }
.cell-class { font-size: 11px; color: #666; }
.cell-room { font-size: 11px; color: #888; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.modal { background: white; border-radius: 12px; padding: 24px; width: 90%; max-width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
.modal h3 { margin-bottom: 16px; color: #4361ee; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
.form-group input { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
.modal-buttons { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }

.btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
.btn-primary { background: #4361ee; color: white; }
.btn-secondary { background: #e0e0e0; color: #333; }
.btn-danger { background: #e63946; color: white; }

.preset-selector { background: white; border-radius: 8px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
.preset-selector select { padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
.preset-list { display: flex; flex-direction: column; gap: 12px; }
.preset-card { background: white; border-radius: 8px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.preset-card-header { display: flex; justify-content: space-between; align-items: center; }
.preset-card-name { font-weight: 600; font-size: 15px; }
.preset-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 12px; }
.preset-table th { background: #f0f4ff; padding: 6px 8px; text-align: left; }
.preset-table td { padding: 6px 8px; border-bottom: 1px solid #f0f0f0; }
.preset-table input[type=time] { border: 1px solid #ddd; border-radius: 4px; padding: 4px; font-size: 12px; }

.calendar-nav { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 12px; }
.calendar-nav button { background: white; border: 1px solid #ddd; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 16px; }
.calendar-title { font-size: 18px; font-weight: 600; }
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: #e0e0e0; border-radius: 8px; overflow: hidden; }
.cal-header { background: #4361ee; color: white; text-align: center; padding: 8px 4px; font-size: 13px; font-weight: 600; }
.cal-header.sun { color: #ffb3ba; }
.cal-header.sat { color: #b3d9ff; }
.cal-day { background: white; min-height: 70px; padding: 4px; }
.cal-day.empty { background: #fafafa; }
.cal-day.weekend { background: #f8f8f8; }
.cal-day.today { outline: 2px solid #4361ee; outline-offset: -2px; }
.day-num { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.day-num.sun { color: #e63946; }
.day-num.sat { color: #4361ee; }
.day-preset { width: 100%; font-size: 10px; padding: 2px 4px; border: 1px solid #ddd; border-radius: 4px; margin-top: 2px; }
.legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 12px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
.c0{background:#4361ee} .c1{background:#e63946} .c2{background:#2ec4b6} .c3{background:#ff9f1c} .c4{background:#9d4edd}

.subject-picker { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.subject-btn { padding: 6px 12px; border: 1px solid #4361ee; border-radius: 20px; background: white; color: #4361ee; cursor: pointer; font-size: 13px; }
.subject-btn:hover, .subject-btn.selected { background: #4361ee; color: white; }

.subject-manager { background: white; border-radius: 8px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 12px; }
.subject-manager h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
.subject-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.subject-tag { display: flex; align-items: center; gap: 4px; padding: 4px 10px; background: #f0f4ff; border-radius: 20px; font-size: 13px; }
.subject-tag button { background: none; border: none; cursor: pointer; color: #999; font-size: 15px; line-height: 1; padding: 0; }
.subject-add { display: flex; gap: 8px; }
.subject-add input { flex: 1; padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }

@media (max-width: 600px) {
  .content { padding: 8px; }
  .header h1 { font-size: 16px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>週案</h1>
  <span class="active-preset-badge" id="activePresetLabel"></span>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('timetable')">時間割</div>
  <div class="tab" onclick="switchTab('presets')">プリセット</div>
  <div class="tab" onclick="switchTab('calendar')">カレンダー</div>
</div>

<div class="content">
  <div id="tab-timetable"></div>
  <div id="tab-presets" style="display:none"></div>
  <div id="tab-calendar" style="display:none"></div>
</div>

<div id="toast" style="display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:10px 20px;border-radius:8px;font-size:14px;z-index:2000;white-space:nowrap"></div>

<div class="modal-overlay" id="cellModal" style="display:none">
  <div class="modal">
    <h3 id="cellModalTitle">授業を編集</h3>
    <div class="form-group">
      <label>教科</label>
      <div class="subject-picker" id="subjectPicker"></div>
      <input type="text" id="inputSubject" placeholder="例：数学" oninput="syncSubjectPicker()">
    </div>
    <div class="form-group">
      <label>クラス</label>
      <input type="text" id="inputClass" placeholder="例：2年1組">
    </div>
    <div class="form-group">
      <label>場所</label>
      <input type="text" id="inputRoom" placeholder="例：理科室">
    </div>
    <div class="modal-buttons">
      <button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-danger" onclick="clearCell()">クリア</button>
      <button class="btn btn-primary" onclick="saveCell()">保存</button>
    </div>
  </div>
</div>

<script>
const DAYS = ['月','火','水','木','金','土'];
const ALL_PERIODS = ['1','2','3','4','5','6','放課後'];

const DEFAULT_PRESETS = [
  {
    id:'normal', name:'通常日程', visiblePeriods:['1','2','3','4'],
    slots:{
      '1':{label:'1時限',start:'17:40',end:'18:20'},
      '2':{label:'2時限',start:'18:50',end:'19:30'},
      '3':{label:'3時限',start:'19:35',end:'20:15'},
      '4':{label:'4時限',start:'20:20',end:'21:00'},
      '5':{label:'5時限',start:'21:05',end:'21:45'},
      '6':{label:'6時限',start:'21:50',end:'22:30'},
      '放課後':{label:'放課後',start:'22:35',end:'23:25'},
    }
  },
  {
    id:'35min', name:'35分日程', visiblePeriods:['1','2','3','4','5'],
    slots:{
      '1':{label:'1時限',start:'17:40',end:'18:15'},
      '2':{label:'2時限',start:'18:45',end:'19:20'},
      '3':{label:'3時限',start:'19:25',end:'20:00'},
      '4':{label:'4時限',start:'20:05',end:'20:40'},
      '5':{label:'5時限',start:'20:40',end:'21:00'},
      '6':{label:'6時限',start:'20:40',end:'20:40'},
      '放課後':{label:'放課後',start:'20:40',end:'20:40'},
    }
  },
  {
    id:'30min', name:'30分授業', visiblePeriods:['1','2','3','4','5'],
    slots:{
      '1':{label:'1時限',start:'17:40',end:'18:10'},
      '2':{label:'2時限',start:'18:40',end:'19:10'},
      '3':{label:'3時限',start:'19:15',end:'19:45'},
      '4':{label:'4時限',start:'19:50',end:'20:20'},
      '5':{label:'5時限',start:'20:20',end:'21:00'},
      '6':{label:'6時限',start:'20:20',end:'20:20'},
      '放課後':{label:'放課後',start:'20:20',end:'20:20'},
    }
  },
  {
    id:'exam', name:'テスト日程', visiblePeriods:['1','2','3','4'],
    slots:{
      '1':{label:'1時限',start:'17:40',end:'18:10'},
      '2':{label:'2時限',start:'18:40',end:'19:20'},
      '3':{label:'3時限',start:'19:30',end:'20:10'},
      '4':{label:'4時限',start:'20:20',end:'21:00'},
      '5':{label:'5時限',start:'21:00',end:'21:00'},
      '6':{label:'6時限',start:'21:00',end:'21:00'},
      '放課後':{label:'放課後',start:'21:00',end:'21:00'},
    }
  },
  {
    id:'ceremony', name:'始業式・終業式・修了式', visiblePeriods:['1','放課後'],
    slots:{
      '1':{label:'式',start:'17:40',end:'18:10'},
      '2':{label:'2時限',start:'18:10',end:'18:10'},
      '3':{label:'3時限',start:'18:10',end:'18:10'},
      '4':{label:'4時限',start:'18:10',end:'18:10'},
      '5':{label:'5時限',start:'18:10',end:'18:10'},
      '6':{label:'6時限',start:'18:10',end:'18:10'},
      '放課後':{label:'解散',start:'19:00',end:'19:00'},
    }
  },
];

function createEmptyTimetable() {
  const t = {};
  for (const day of DAYS) {
    t[day] = {};
    for (const p of ALL_PERIODS) t[day][p] = {subject:'',className:'',room:''};
  }
  return t;
}

const DEFAULT_SUBJECTS = ['国語','算数','数学','理科','社会','英語','音楽','体育','図工','美術','家庭','技術','道徳','総合','学活','自習'];

function createDefaultData() {
  return { timetable: createEmptyTimetable(), presets: DEFAULT_PRESETS, calendarConfig: {}, activePresetId: 'normal', subjects: DEFAULT_SUBJECTS.slice() };
}

let state = createDefaultData();
let currentTab = 'timetable';
let newSubjectInput = '';
let editingCell = null;
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth() + 1;

function init() {
  google.script.run
    .withSuccessHandler(function(result) {
      if (result && result.data) {
        try {
          const loaded = JSON.parse(result.data);
          state = Object.assign(createDefaultData(), loaded);
          if (!state.presets || !state.presets.length) state.presets = DEFAULT_PRESETS;
          if (!state.subjects || !state.subjects.length) state.subjects = DEFAULT_SUBJECTS.slice();
        } catch(e) { state = createDefaultData(); }
      }
      render();
    })
    .withFailureHandler(function() { render(); })
    .loadData();
}

function saveState() {
  google.script.run.withSuccessHandler(function(){}).withFailureHandler(function(){}).saveData(JSON.stringify(state));
}

function getActivePreset() {
  return state.presets.find(p => p.id === state.activePresetId) || state.presets[0];
}

function presetColor(i) { return 'c' + (i % 5); }

function formatDate(date) {
  return date.getFullYear() + '-' + String(date.getMonth()+1).padStart(2,'0') + '-' + String(date.getDate()).padStart(2,'0');
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', ['timetable','presets','calendar'][i] === tab);
  });
  ['timetable','presets','calendar'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? '' : 'none';
  });
  render();
}

function render() {
  const preset = getActivePreset();
  document.getElementById('activePresetLabel').textContent = preset ? preset.name : '';
  if (currentTab === 'timetable') renderTimetable();
  else if (currentTab === 'presets') renderPresets();
  else renderCalendar();
}

function renderTimetable() {
  const preset = getActivePreset();
  const periods = preset ? (preset.visiblePeriods || ALL_PERIODS) : ALL_PERIODS;
  let html = '<div class="timetable-wrap"><table class="timetable"><thead><tr><th class="period-cell">時限</th>';
  for (const day of DAYS) html += `<th>${day}</th>`;
  html += '</tr></thead><tbody>';
  for (const period of periods) {
    const slot = preset && preset.slots ? preset.slots[period] : null;
    html += '<tr><td class="period-cell">';
    html += `<div class="period-label">${slot ? slot.label : (period === '放課後' ? '放課後' : period+'時限')}</div>`;
    if (slot && slot.start && slot.start !== slot.end) html += `<div class="period-time">${slot.start}〜${slot.end}</div>`;
    html += '</td>';
    for (const day of DAYS) {
      const cell = state.timetable[day] && state.timetable[day][period];
      const isEmpty = !cell || (!cell.subject && !cell.className && !cell.room);
      html += `<td><div class="cell ${isEmpty?'empty':''}" onclick="openCellModal('${day}','${period}')">`;
      if (isEmpty) html += '+';
      else {
        if (cell.subject) html += `<div class="cell-subject">${cell.subject}</div>`;
        if (cell.className) html += `<div class="cell-class">${cell.className}</div>`;
        if (cell.room) html += `<div class="cell-room">${cell.room}</div>`;
      }
      html += '</div></td>';
    }
    html += '</tr>';
  }
  html += '</tbody></table></div>';
  document.getElementById('tab-timetable').innerHTML = html;
}

function renderPresets() {
  let html = '<div class="subject-manager"><h3>教科プリセット</h3><div class="subject-tags">';
  for (let i = 0; i < state.subjects.length; i++) {
    const s = state.subjects[i].replace(/'/g,"\\'");
    html += `<div class="subject-tag"><span>${state.subjects[i]}</span><button onclick="removeSubject(${i})" title="削除">×</button></div>`;
  }
  html += '</div><div class="subject-add"><input type="text" id="newSubjectInput" placeholder="教科名を入力" onkeydown="if(event.key===\'Enter\')addSubject()"><button class="btn btn-primary" onclick="addSubject()">追加</button></div></div>';

  html += '<div class="preset-selector"><label>現在のプリセット：</label><select onchange="setActivePreset(this.value)">';
  for (const p of state.presets) html += `<option value="${p.id}" ${p.id===state.activePresetId?'selected':''}>${p.name}</option>`;
  html += '</select></div><div class="preset-list">';
  const displayPeriods = ALL_PERIODS.filter(p => p !== '6');
  for (const p of state.presets) {
    html += `<div class="preset-card"><div class="preset-card-header"><span class="preset-card-name">${p.name}</span>`;
    html += `<button class="btn btn-secondary" onclick="toggleEdit('${p.id}')">編集</button></div>`;
    html += `<div id="edit-${p.id}" style="display:none"><table class="preset-table"><thead><tr><th>時限</th><th>開始</th><th>終了</th></tr></thead><tbody>`;
    for (const period of displayPeriods) {
      const slot = p.slots[period];
      html += `<tr><td>${slot.label}</td>`;
      html += `<td><input type="time" value="${slot.start}" onchange="updateSlot('${p.id}','${period}','start',this.value)"></td>`;
      html += `<td><input type="time" value="${slot.end}" onchange="updateSlot('${p.id}','${period}','end',this.value)"></td></tr>`;
    }
    html += '</tbody></table></div></div>';
  }
  html += '</div>';
  document.getElementById('tab-presets').innerHTML = html;
}

function renderCalendar() {
  const todayStr = formatDate(new Date());
  const firstDay = new Date(calYear, calMonth-1, 1);
  const lastDay = new Date(calYear, calMonth, 0);
  let html = '<div class="legend">';
  for (let i = 0; i < state.presets.length; i++) {
    html += `<div class="legend-item"><div class="legend-dot ${presetColor(i)}"></div><span>${state.presets[i].name}</span></div>`;
  }
  html += '</div>';
  html += `<div class="calendar-nav"><button onclick="calPrev()">＜</button><span class="calendar-title">${calYear}年${calMonth}月</span><button onclick="calNext()">＞</button><button class="btn btn-primary" onclick="printMonthly()" style="margin-left:12px;font-size:13px">今月の予定を出力</button><button class="btn btn-secondary" onclick="syncToCalendar()" style="margin-left:6px;font-size:13px">Googleカレンダーに追加</button></div>`;
  html += '<div class="calendar-grid">';
  ['日','月','火','水','木','金','土'].forEach((d,i) => {
    html += `<div class="cal-header ${i===0?'sun':i===6?'sat':''}">${d}</div>`;
  });
  for (let i = 0; i < firstDay.getDay(); i++) html += '<div class="cal-day empty"></div>';
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const date = new Date(calYear, calMonth-1, d);
    const dow = date.getDay();
    const dateStr = formatDate(date);
    const config = state.calendarConfig[dateStr];
    html += `<div class="cal-day ${dow===0||dow===6?'weekend':''} ${dateStr===todayStr?'today':''}">`;
    html += `<div class="day-num ${dow===0?'sun':dow===6?'sat':''}">${d}</div>`;
    if (dow !== 0) {
      html += `<select class="day-preset" onchange="setDayPreset('${dateStr}',this.value)"><option value="">−</option>`;
      for (const p of state.presets) {
        html += `<option value="${p.id}" ${config&&config.presetId===p.id?'selected':''}>${p.name}</option>`;
      }
      html += '</select>';
    }
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('tab-calendar').innerHTML = html;
}

function setActivePreset(id) { state.activePresetId = id; render(); saveState(); }
function toggleEdit(id) { const el = document.getElementById('edit-'+id); if(el) el.style.display = el.style.display==='none'?'':'none'; }
function updateSlot(presetId, period, field, value) {
  const p = state.presets.find(p=>p.id===presetId);
  if (p && p.slots[period]) { p.slots[period][field] = value; saveState(); }
}
function renderSubjectPicker() {
  const current = document.getElementById('inputSubject').value.trim();
  let html = '';
  for (const s of state.subjects) {
    html += `<button class="subject-btn ${s===current?'selected':''}" onclick="selectSubject('${s.replace(/'/g,"\\'")}',this)">${s}</button>`;
  }
  document.getElementById('subjectPicker').innerHTML = html;
}
function selectSubject(name, btn) {
  document.getElementById('inputSubject').value = name;
  document.querySelectorAll('#subjectPicker .subject-btn').forEach(b => b.classList.remove('selected'));
  if (btn) btn.classList.add('selected');
}
function syncSubjectPicker() {
  const current = document.getElementById('inputSubject').value.trim();
  document.querySelectorAll('#subjectPicker .subject-btn').forEach(b => {
    b.classList.toggle('selected', b.textContent === current);
  });
}
function openCellModal(day, period) {
  editingCell = {day, period};
  const cell = state.timetable[day] && state.timetable[day][period];
  document.getElementById('inputSubject').value = cell ? cell.subject : '';
  document.getElementById('inputClass').value = cell ? cell.className : '';
  document.getElementById('inputRoom').value = cell ? cell.room : '';
  const preset = getActivePreset();
  const slot = preset && preset.slots ? preset.slots[period] : null;
  document.getElementById('cellModalTitle').textContent = `${day}曜 ${slot ? slot.label : period+'時限'}`;
  renderSubjectPicker();
  document.getElementById('cellModal').style.display = 'flex';
}
function closeModal() { document.getElementById('cellModal').style.display = 'none'; editingCell = null; }
function saveCell() {
  if (!editingCell) return;
  const {day, period} = editingCell;
  if (!state.timetable[day]) state.timetable[day] = {};
  state.timetable[day][period] = {
    subject: document.getElementById('inputSubject').value.trim(),
    className: document.getElementById('inputClass').value.trim(),
    room: document.getElementById('inputRoom').value.trim(),
  };
  closeModal(); render(); saveState();
}
function clearCell() {
  if (!editingCell) return;
  const {day, period} = editingCell;
  if (state.timetable[day]) state.timetable[day][period] = {subject:'',className:'',room:''};
  closeModal(); render(); saveState();
}
function setDayPreset(dateStr, presetId) {
  if (!state.calendarConfig[dateStr]) state.calendarConfig[dateStr] = {};
  state.calendarConfig[dateStr].presetId = presetId || null;
  saveState(); renderCalendar();
}
function calPrev() { if(calMonth===1){calMonth=12;calYear--;}else calMonth--; renderCalendar(); }
function calNext() { if(calMonth===12){calMonth=1;calYear++;}else calMonth++; renderCalendar(); }

function showToast(msg, duration) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(function() { el.style.display = 'none'; }, duration || 3000);
}

function syncToCalendar() {
  // Count days with preset
  const firstDay = new Date(calYear, calMonth-1, 1);
  const lastDay = new Date(calYear, calMonth, 0);
  let days = 0;
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const date = new Date(calYear, calMonth-1, d);
    const dateStr = formatDate(date);
    const config = state.calendarConfig[dateStr];
    if (config && config.presetId) days++;
  }
  if (days === 0) { showToast('カレンダーに日程が設定されていません'); return; }

  if (!confirm(calYear + '年' + calMonth + '月の予定（' + days + '日分）をGoogleカレンダーに追加します。\nよろしいですか？')) return;

  showToast('追加中...', 30000);
  const payload = JSON.stringify({ year: calYear, month: calMonth, state: state });
  google.script.run
    .withSuccessHandler(function(result) {
      if (result.success) {
        showToast(calMonth + '月の予定を' + result.count + '件追加しました');
      } else {
        showToast('エラー：' + result.error);
      }
    })
    .withFailureHandler(function(err) {
      showToast('エラーが発生しました：' + (err.message || err));
    })
    .createCalendarEvents(payload);
}

function printMonthly() {
  const DOW_NAMES = ['日','月','火','水','木','金','土'];
  const firstDay = new Date(calYear, calMonth-1, 1);
  const lastDay = new Date(calYear, calMonth, 0);
  // Collect all days with a preset
  const rows = [];
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const date = new Date(calYear, calMonth-1, d);
    const dow = date.getDay();
    if (dow === 0) continue; // skip Sunday
    const dateStr = formatDate(date);
    const config = state.calendarConfig[dateStr];
    const presetId = config && config.presetId;
    const preset = presetId ? state.presets.find(p => p.id === presetId) : null;
    rows.push({ d, dow, dateStr, preset });
  }

  // Determine which periods to show (union of all visible periods used)
  const ALL_PRINT_PERIODS = ['1','2','3','4','5','放課後'];

  let tableRows = '';
  for (const row of rows) {
    const { d, dow, preset } = row;
    const dayName = DOW_NAMES[dow];
    const dayKey = ['','月','火','水','木','金','土'][dow];
    const visiblePeriods = preset ? (preset.visiblePeriods || ALL_PRINT_PERIODS) : null;
    let rowHtml = `<tr>
      <td style="white-space:nowrap">${calMonth}/${d}（${dayName}）</td>
      <td>${preset ? preset.name : '−'}</td>`;
    for (const period of ALL_PRINT_PERIODS) {
      if (!preset || !visiblePeriods.includes(period)) {
        rowHtml += `<td style="color:#ccc">−</td>`;
        continue;
      }
      const slot = preset.slots[period];
      const cell = state.timetable[dayKey] && state.timetable[dayKey][period];
      const subject = cell ? cell.subject : '';
      const room = cell ? cell.room : '';
      const timeStr = slot && slot.start !== slot.end ? `<div style="font-size:10px;color:#888">${slot.start}〜${slot.end}</div>` : '';
      rowHtml += `<td>${timeStr}${subject ? `<strong>${subject}</strong>` : ''}<br>${room}</td>`;
    }
    rowHtml += '</tr>';
    tableRows += rowHtml;
  }

  const html = `<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<title>${calYear}年${calMonth}月 時間割</title>
<style>
body { font-family: -apple-system, sans-serif; font-size: 12px; margin: 16px; }
h2 { margin-bottom: 12px; font-size: 16px; }
table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #ccc; padding: 5px 7px; vertical-align: top; text-align: center; }
th { background: #4361ee; color: white; }
tr:nth-child(even) td { background: #f8f9ff; }
.sat th, .sat td { color: #2255cc; }
@media print { button { display:none; } }
</style>
</head><body>
<h2>${calYear}年${calMonth}月 時間割</h2>
<button onclick="window.print()" style="margin-bottom:12px;padding:6px 16px;background:#4361ee;color:white;border:none;border-radius:6px;cursor:pointer;font-size:13px">印刷する</button>
<table>
<thead><tr>
  <th>日付</th><th>日程</th>
  <th>1時限</th><th>2時限</th><th>3時限</th><th>4時限</th><th>5時限</th><th>放課後</th>
</tr></thead>
<tbody>${tableRows}</tbody>
</table>
</body></html>`;

  const w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
}
function addSubject() {
  const input = document.getElementById('newSubjectInput');
  const name = input.value.trim();
  if (!name || state.subjects.includes(name)) return;
  state.subjects.push(name);
  input.value = '';
  saveState();
  renderPresets();
}
function removeSubject(index) {
  state.subjects.splice(index, 1);
  saveState();
  renderPresets();
}

init();
</script>
</body>
